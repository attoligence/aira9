<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo">Attoligence</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">Menu</button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="mock-interview.html" class="active">Mock Interview</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero hero-page">
      <div class="hero-bg" style="background-image:url('https://images.unsplash.com/photo-1552581234-26160f608093?auto=format&fit=crop&w=2000&q=80');"></div>
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <h1>HR Interview Expert Registration</h1>
        <p>Join Attoligence as an interview expert and support candidates with practical mock interview sessions.</p>
      </div>
    </section>

    <section class="section">
      <div class="container form-wrap panel reveal">
        <form data-google-sheet="true" data-form-name="HR Interview Expert Registration" data-endpoint="https://script.google.com/macros/s/AKfycbwyx8gxPYXf3_78k9r1MV27PeAFUALZ9VD3AAo0wpm6dH6XyhANvrQfYr4UMYTukZ9Kjg/exec">
          <div class="form-grid-2">
            <label>Name<input type="text" name="name" required /></label>
            <label>Email<input type="email" name="email" required /></label>
            <label>Phone<input type="tel" name="phone" required /></label>
            <label>HR Experience<input type="text" name="hrExperience" placeholder="Example: 6 years" required /></label>
            <label>Current Designation<input type="text" name="currentDesignation" required /></label>
            <label>Industry Expertise<input type="text" name="industryExpertise" required /></label>
            <label>Preferred Interview Domain<input type="text" name="preferredInterviewDomain" required /></label>
            <label>Available Mode<select name="availableMode" required><option value="" selected disabled>Select</option><option>Online</option><option>Offline</option><option>Either</option></select></label>
          </div>
          <label>Professional Summary<textarea rows="4" name="professionalSummary" placeholder="Briefly describe your HR / interview experience"></textarea></label>
          <button class="btn btn-primary" type="submit" data-default-text="Apply Now">Apply Now</button>
          <div class="form-status" aria-live="polite"></div>
        </form>
      </div>
    </section>
  </main>
